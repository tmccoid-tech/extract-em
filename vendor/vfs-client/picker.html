<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title data-i18n-content="pageTitle">Select File</title>
  <link rel="stylesheet" href="picker.css" />
  <script type="module" src="picker.mjs"></script>
</head>

<body>
  <div id="vfs-picker">

    <!-- Busy overlay - covers toolbar/breadcrumb/content; footer stays reachable for cancel -->
    <div id="vfs-busy-overlay"></div>

    <!-- Toolbar -->
    <div id="vfs-toolbar">
      <button id="vfs-btn-new-folder" data-i18n-title="titleNewFolder" title="Create new folder">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
          <path
            d="M8 2a.5.5 0 0 1 .5.5v5h5a.5.5 0 0 1 0 1h-5v5a.5.5 0 0 1-1 0v-5h-5a.5.5 0 0 1 0-1h5v-5A.5.5 0 0 1 8 2z" />
        </svg>
        <span data-i18n-content="btnFolder">Folder</span>
      </button>

      <button id="vfs-btn-store" data-i18n-title="titleAdd" title="Add files from local filesystem">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
          <path
            d="M8 2a.5.5 0 0 1 .5.5v5h5a.5.5 0 0 1 0 1h-5v5a.5.5 0 0 1-1 0v-5h-5a.5.5 0 0 1 0-1h5v-5A.5.5 0 0 1 8 2z" />
        </svg>
        <span data-i18n-content="btnFile">File</span>
      </button>

      <div class="toolbar-sep"></div>

      <button id="vfs-btn-rename" data-i18n-title="titleRename" title="Rename selected item (F2)">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
          <path
            d="M12.854.146a.5.5 0 0 0-.707 0L10.5 1.793 14.207 5.5l1.647-1.646a.5.5 0 0 0 0-.708l-3-3zm.646 6.061L9.793 2.5 3.293 9H3.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.207l6.5-6.5zm-7.468 7.468A.5.5 0 0 1 6 13.5V13h-.5a.5.5 0 0 1-.5-.5V12h-.5a.5.5 0 0 1-.5-.5V11h-.5a.5.5 0 0 1-.5-.5V10h-.5a.499.499 0 0 1-.175-.032l-.179.178a.5.5 0 0 0-.11.168l-2 5a.5.5 0 0 0 .65.65l5-2a.5.5 0 0 0 .168-.11l.178-.178z" />
        </svg>
      </button>

      <button id="vfs-btn-cut" data-i18n-title="titleCut" title="Cut selected item (Ctrl+X)">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
          <path
            d="M3.5 3.5c-.614-.884-.074-1.962.858-2.5L8 7.226 11.642 1c.932.538 1.472 1.616.858 2.5L8.81 8.61l1.556 2.661a2.5 2.5 0 1 1-.794.637L8 9.73l-1.572 2.177a2.5 2.5 0 1 1-.794-.637L7.19 8.61 3.5 3.5zm2.5 10a1.5 1.5 0 1 0-3 0 1.5 1.5 0 0 0 3 0zm7 0a1.5 1.5 0 1 0-3 0 1.5 1.5 0 0 0 3 0z" />
        </svg>
      </button>

      <button id="vfs-btn-copy" data-i18n-title="titleCopy" title="Copy selected items (Ctrl+C)">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
          <path fill-rule="evenodd" d="M1 4h9v9H1V4zM2 5h7v7H2V5z" />
          <path fill-rule="evenodd" d="M6 1h9v9H6V1zM7 2h7v7H7V2z" />
        </svg>
      </button>

      <button id="vfs-btn-paste" data-i18n-title="titlePaste" title="Paste (Ctrl+V)">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
          <path
            d="M4 1.5H3a2 2 0 0 0-2 2V14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V3.5a2 2 0 0 0-2-2h-1v1h1a1 1 0 0 1 1 1V14a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V3.5a1 1 0 0 1 1-1h1v-1z" />
          <path
            d="M9.5 1a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-.5.5h-3a.5.5 0 0 1-.5-.5v-1a.5.5 0 0 1 .5-.5h3zm-3-1A1.5 1.5 0 0 0 5 1.5h-.5A1.5 1.5 0 0 0 3 3v.5h10V3a1.5 1.5 0 0 0-1.5-1.5H11A1.5 1.5 0 0 0 9.5 0h-3z" />
        </svg>
      </button>

      <div class="toolbar-sep"></div>

      <button id="vfs-btn-delete" class="btn-danger" data-i18n-title="titleDelete" title="Delete selected item (Del)">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
          <path
            d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0V6z" />
          <path fill-rule="evenodd"
            d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1v1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4H4.118zM2.5 3V2h11v1h-11z" />
        </svg>
      </button>

      <!-- Custom buttons injected by picker.mjs from the 'buttons' URL param -->
      <div id="vfs-custom-buttons"></div>

      <div class="toolbar-spacer"></div>

      <!-- Filter -->
      <div id="vfs-filter-wrap">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"
          style="color:var(--vfs-text-muted);flex-shrink:0" aria-hidden="true">
          <path
            d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.099zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z" />
        </svg>
        <input type="text" id="vfs-filter" data-i18n-placeholder="filterPlaceholder"
          data-i18n-aria-label="filterAriaLabel" placeholder="Filter by type…" aria-label="Filter files by extension" />
      </div>

      <!-- Hidden file input for uploads -->
      <input type="file" id="vfs-file-input" multiple style="display:none" aria-hidden="true" />
    </div>

    <!-- Location bar: pinned provider select + scrollable breadcrumb -->
    <div id="vfs-location-bar">
      <div id="vfs-breadcrumb" role="navigation" data-i18n-aria-label="ariaNavigation" aria-label="Current path"></div>
    </div>

    <!-- Content: list + preview -->
    <div id="vfs-content">
      <div id="vfs-list-area" role="listbox" data-i18n-aria-label="ariaFileList" aria-label="Files and folders">
        <!-- populated by picker.mjs -->
      </div>
      <!-- Drop overlay - covers list area, shown only during external file drag -->
      <div id="vfs-drop-overlay" aria-hidden="true">
        <div id="vfs-drop-overlay-box">
          <svg xmlns="http://www.w3.org/2000/svg" width="52" height="52" viewBox="0 0 24 24"
               fill="none" stroke="white" stroke-width="1.5"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="12" y1="12" x2="12" y2="18"/>
            <polyline points="9 15 12 18 15 15"/>
          </svg>
        </div>
      </div>
      <div id="vfs-preview" data-i18n-aria-label="ariaPreview" aria-label="File preview">
        <div id="vfs-preview-placeholder">
          <span data-i18n-content="noFileSelected">No file selected</span>
        </div>
      </div>
    </div>

    <!-- Save filename bar (save mode only) -->
    <div id="vfs-save-bar" hidden>
      <label for="vfs-save-name" data-i18n-content="saveNameLabel">Filename</label>
      <input type="text" id="vfs-save-name" autocomplete="off" spellcheck="false" />
    </div>

    <!-- Footer -->
    <div id="vfs-footer">
      <span id="vfs-storage-info" aria-live="polite"></span>
      <span id="vfs-status" aria-live="polite"></span>
      <button type="button" class="btn-secondary" id="vfs-cancel-btn"><span
          data-i18n-content="btnClose">Close</span></button>
      <button type="button" class="btn-primary" id="vfs-open-btn" disabled><span
          data-i18n-content="btnSelectFile">Select File</span></button>
    </div>

  </div>

  <!-- Context Menu -->
  <div id="vfs-context-menu" role="menu" data-i18n-aria-label="ariaContextMenu" aria-label="Item actions"></div>

</body>

</html>
